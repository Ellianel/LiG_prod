name: Trello Sync

on:
  pull_request:
    types: [opened, closed, reopened]

jobs:
  trello-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync PR with Trello
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          LIST_CODE_REVIEW: "69c569339a93f8cc8c4ae963"
          LIST_DONE: "69ac5415ec8f2e2674005ac0"
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_ACTION: ${{ github.event.action }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
        run: |
          # Extract Trello card ID from PR body (e.g. https://trello.com/c/ABC123xyz)
          CARD_ID=$(echo "$PR_BODY" | grep -oP 'trello.com/c/\K[^/ ]+' | head -n 1)
          
          if [ -z "$CARD_ID" ]; then
            echo "No Trello card link found in PR description."
            exit 0
          fi
          
          echo "Found Trello card: $CARD_ID"
          
          TARGET_LIST=""
          if [ "$PR_ACTION" == "opened" ] || [ "$PR_ACTION" == "reopened" ]; then
            TARGET_LIST=$LIST_CODE_REVIEW
          elif [ "$PR_ACTION" == "closed" ] && [ "$PR_MERGED" == "true" ]; then
            TARGET_LIST=$LIST_DONE
          fi
          
          if [ -n "$TARGET_LIST" ]; then
            echo "Moving card to list: $TARGET_LIST"
            curl -s -X PUT "https://api.trello.com/1/cards/$CARD_ID?idList=$TARGET_LIST&key=$TRELLO_KEY&token=$TRELLO_TOKEN"
          else
            echo "No action needed for PR state: $PR_ACTION (Merged: $PR_MERGED)"
          fi
